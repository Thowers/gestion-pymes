<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión – GestiónPyMES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 400px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
    .login-header { background: #1a1d2e; color: #fff; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
    .btn-login { background: #4f46e5; border: none; padding: .75rem; font-size: 1rem; }
    .btn-login:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <i class="bi bi-shop fs-2"></i>
      <h4 class="mt-2 mb-0">GestiónPyMES</h4>
      <p class="text-white-50 small mb-0">Sistema de inventarios y ventas</p>
    </div>
    <div class="card-body p-4">
      {% if form.errors %}
        <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" name="username" class="form-control form-control-lg" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white fw-semibold">
          Ingresar
        </button>
      </form>
    </div>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
